apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops4-deployment
  labels:
    app: devops4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops4
  template:
    metadata:
      labels:
        app: devops4
    spec:
      containers:
        - name: devops4
          image: ridvandursun/devops4:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
